<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell the Singer</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#e7f1f9,#ffffff);
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

/* NAV */

nav{
width:100%;
padding:15px 30px;
background:#1e2b38;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.nav-links a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:600;
}

.nav-links a:hover{
color:#ffcb05;
}

.login-btn{
background:#ffcb05;
border:none;
padding:8px 18px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

/* GAME */

.container{
margin-top:50px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:600px;
width:90%;
text-align:center;
}

.game-title{
font-size:2.2rem;
margin-bottom:10px;
color:#315f85;
}

.stats{
font-size:1.1rem;
margin-bottom:20px;
color:#315f85;
}

#blanks{
font-size:2.4rem;
letter-spacing:10px;
margin:25px 0;
font-weight:bold;
}

.guess-input{
padding:12px;
font-size:1rem;
width:100%;
max-width:320px;
border-radius:10px;
border:2px solid #e0e0e0;
text-align:center;
}

.guess-input:focus{
outline:none;
border-color:#315f85;
}

button{
padding:12px 24px;
margin:12px;
background:#ffcb05;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
font-size:1rem;
}

button:hover{
background:#ffd84d;
}

.message{
font-size:1.2rem;
margin-top:15px;
}

.progress-bar{
width:100%;
height:10px;
background:#eee;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.progress{
height:100%;
background:#315f85;
width:100%;
transition:width 1s linear;
}

/* MOBILE */

@media(max-width:600px){

#blanks{
font-size:1.8rem;
letter-spacing:6px;
}

.container{
padding:25px;
}

}

</style>
</head>

<body>

<nav>
<div class="nav-links">
<a href="/index.html">Home</a>
<a href="/allgames.html">Games</a>
<a href="/about.html">About</a>
</div>
<button class="login-btn">Login</button>
</nav>

<div class="container">

<h1 class="game-title">Spell the Singer</h1>

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<div class="stats">
Time Left: <span id="timer">100</span> |
High Score: <span id="highscore">0</span> |
Correct: <span id="correctCount">0</span>/5
</div>

<div id="blanks"></div>

<input id="guessInput" class="guess-input" placeholder="Guess the singer...">

<div>
<button onclick="submitGuess()">Submit Guess</button>
<button id="playAgain" onclick="startGame()" style="display:none">Play Again</button>
</div>

<div id="message" class="message"></div>

</div>

<script>

const singers=[
"Adele","Taylor Swift","Bruno Mars","Ed Sheeran","Lady Gaga","Justin Bieber","Beyonce",
"Rihanna","Harry Styles","Ariana Grande","Billie Eilish","Sam Smith","Dua Lipa",
"Shawn Mendes","Camila Cabello","Selena Gomez","Katy Perry","Nicki Minaj",
"Doja Cat","Post Malone","Olivia Rodrigo","The Weeknd","Drake","Lizzo",
"Miley Cyrus","Halsey","SZA","Frank Ocean","Charlie Puth","Jennifer Lopez",
"Kelly Clarkson","Jason Derulo","Zayn Malik","Liam Payne","Louis Tomlinson",
"Niall Horan","Avril Lavigne","Britney Spears","Mariah Carey","Alicia Keys",
"John Legend","Elton John","Stevie Wonder","Aretha Franklin","Whitney Houston",
"Celine Dion","Michael Bublé","Eminem","50 Cent","Kendrick Lamar","Travis Scott",
"Tyler Creator","Ice Spice","Flo Rida","Pitbull","Sia","Adam Levine",
"Chris Brown","Lana Del Rey","Lorde","Bad Bunny","Rosalia","J Balvin",
"Shakira","Ricky Martin","Luis Fonsi","Paul McCartney","Mick Jagger",
"Freddie Mercury","David Bowie","George Michael","Elvis Presley",
"Prince","Billy Joel","Bob Dylan","Phil Collins","Jon Bon Jovi","Sting"
];

let singerQueue=[];
let currentSinger="";
let revealed=[];
let correct=0;
let time=100;

let timer;
let revealTimer;

let highScore=localStorage.getItem("spellSingerHighScore")||0;
document.getElementById("highscore").textContent=highScore;

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function startGame(){

singerQueue=shuffle([...singers]);

correct=0;
time=100;

document.getElementById("correctCount").textContent=0;
document.getElementById("timer").textContent=time;
document.getElementById("playAgain").style.display="none";
document.querySelector('button[onclick="submitGuess()"]').style.display="inline-block";
document.getElementById("message").textContent="";

clearInterval(timer);
clearInterval(revealTimer);

timer=setInterval(()=>{
time--;
document.getElementById("timer").textContent=time;
document.getElementById("progress").style.width=time+"%";

if(time<=0) endGame(false);

},1000);

nextSinger();
}

function updateBlanks(){

document.getElementById("blanks").textContent=
revealed.join(" ");

}

function nextSinger(){

if(singerQueue.length===0)
singerQueue=shuffle([...singers]);

currentSinger=singerQueue.shift().toUpperCase();

revealed=currentSinger.split("").map(c=>c===" "?" ":"_");

updateBlanks();

let hidden=currentSinger
.split("")
.map((c,i)=>c===" "?null:i)
.filter(i=>i!==null);

clearInterval(revealTimer);

revealTimer=setInterval(()=>{

if(hidden.length===0) return;

let r=hidden.splice(Math.floor(Math.random()*hidden.length),1)[0];
revealed[r]=currentSinger[r];
updateBlanks();

},3000);

}

function submitGuess(){

let guess=document.getElementById("guessInput").value.toUpperCase().trim();
document.getElementById("guessInput").value="";

if(guess===currentSinger){

correct++;
document.getElementById("correctCount").textContent=correct;

if(correct>=5){
endGame(true);
}else{
nextSinger();
}

}else{

document.getElementById("message").textContent="❌ Incorrect";

setTimeout(()=>document.getElementById("message").textContent="",1500);

}

}

function endGame(win){

clearInterval(timer);
clearInterval(revealTimer);

let score=win?time:0;

document.getElementById("message").textContent=
win?`🎉 You Win! Score: ${score}`:"⏰ Time Up";

if(score>highScore){
localStorage.setItem("spellSingerHighScore",score);
document.getElementById("highscore").textContent=score;
}

document.getElementById("playAgain").style.display="inline-block";
document.querySelector('button[onclick="submitGuess()"]').style.display="none";

}

document.getElementById("guessInput").addEventListener("keypress",e=>{
if(e.key==="Enter") submitGuess();
});

window.onload=startGame;

</script>

</body>
</html>
