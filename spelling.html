<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spell The Singer - Guessing Games</title>

<link rel="icon" href="/favicongg.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
min-height:100vh;
color:#333;
}

/* NAV */

nav{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav a{
margin-right:15px;
text-decoration:none;
font-weight:600;
color:#333;
}

/* HEADER */

header{
text-align:center;
padding:30px;
background:white;
box-shadow:0 2px 20px rgba(0,0,0,.1);
}

header h1{
font-size:2.4rem;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MAIN */

.main{
max-width:900px;
margin:auto;
padding:30px;
width:100%;
}

.game{
background:white;
border-radius:20px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

/* STATS */

.stats{
background:#f3f7fb;
padding:12px 20px;
border-radius:999px;
display:inline-block;
font-weight:700;
margin-bottom:25px;
}

.divider{margin:0 10px;color:#bbb;}

/* LETTER BOXES */

#blanks{
display:flex;
flex-direction:column;
align-items:center;
margin:25px 0;
}

.letter-box{
width:42px;
height:42px;
background:#f3f7fb;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:1.2rem;
border:2px solid #e0e0e0;
}

/* INPUT */

input{
margin-top:15px;
padding:12px;
border-radius:20px;
border:2px solid #ddd;
width:260px;
font-size:1rem;
}

/* BUTTON */

button{
margin-top:12px;
padding:12px 20px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{transform:translateY(-2px)}

#message{
margin-top:15px;
font-weight:700;
font-size:1.1rem;
}

/* FOOTER */

footer{
margin-top:auto;
background:white;
padding:20px;
text-align:center;
}

/* MODAL */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal{
background:white;
padding:30px;
border-radius:22px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.modal h2{
font-size:1.8rem;
margin-bottom:10px;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<nav>
<div>
<a href="/index.html">Home</a>
<a href="/allgames.html">Games</a>
<a href="/about.html">About</a>
</div>
</nav>

<header>
<h1>🎤 Spell The Singer</h1>
<p>Guess the singer before the timer runs out.</p>
</header>

<div class="main">
<div class="game">

<div class="stats">
<span id="timer">Time: 100</span>
<span class="divider">|</span>
<span id="score">Correct: 0 / 5</span>
<span class="divider">|</span>
<span id="highscore">High Score: 0</span>
</div>

<div id="blanks"></div>

<input id="guessInput" placeholder="Guess the singer">

<br>

<button onclick="submitGuess()">Submit</button>

<div id="message"></div>

</div>
</div>

<div class="modal-overlay" id="gameOverModal">
<div class="modal">
<h2>Game Over</h2>
<p>Your score:</p>
<div style="font-weight:700;font-size:1.3rem" id="finalScore"></div>
<button onclick="restartGame()">Play Again</button>
</div>
</div>

<footer>
© 2026 Guessing Games
</footer>

<script>

const singers=[
"Adele","Taylor Swift","Bruno Mars","Ed Sheeran","Lady Gaga","Justin Bieber",
"Beyonce","Rihanna","Harry Styles","Ariana Grande","Billie Eilish",
"Sam Smith","Dua Lipa","Shawn Mendes","Camila Cabello","Selena Gomez",
"Katy Perry","Nicki Minaj","Doja Cat","Post Malone","Olivia Rodrigo",
"The Weeknd","Drake","Lizzo","Miley Cyrus","Halsey","SZA","Frank Ocean",
"Charlie Puth","Jennifer Lopez","Kelly Clarkson","Jason Derulo","Zayn Malik",
"Liam Payne","Louis Tomlinson","Niall Horan","Avril Lavigne","Britney Spears",
"Mariah Carey","Alicia Keys","John Legend","Elton John","Stevie Wonder",
"Aretha Franklin","Whitney Houston","Celine Dion","Michael Bublé",
"Eminem","50 Cent","Kendrick Lamar","Travis Scott","Ice Spice",
"Flo Rida","Pitbull","Sia","Chris Brown","Lana Del Rey","Lorde",
"Bad Bunny","Rosalia","J Balvin","Shakira","Ricky Martin",
"Paul McCartney","Freddie Mercury","David Bowie","George Michael",
"Elvis Presley","Prince","Billy Joel","Bob Dylan","Phil Collins",
"Jon Bon Jovi","Sting"
]

let queue=[]
let current=""
let revealed=[]
let correct=0
let time=100
let timer
let revealTimer

let high = parseInt(localStorage.getItem("spellHigh")) || 0
document.getElementById("highscore").textContent = "High Score: " + high
function shuffle(arr){return arr.sort(()=>Math.random()-.5)}

function startGame(){
correct = 0
document.getElementById("score").textContent="Correct: 0 / 5"
queue=shuffle([...singers])
correct=0
time=100

document.getElementById("score").textContent="Correct: 0"
document.getElementById("timer").textContent="Time: 100"

nextSinger()

timer=setInterval(()=>{
time--
document.getElementById("timer").textContent="Time: "+time
if(time<=0)endGame()
},1000)

}

function renderBoxes(){

const container = document.getElementById("blanks")
container.innerHTML=""

const words = revealed.join("").split(" ")

words.forEach(word=>{

const row = document.createElement("div")
row.style.display="flex"
row.style.justifyContent="center"
row.style.gap="10px"
row.style.marginBottom="10px"

word.split("").forEach(letter=>{

const box=document.createElement("div")
box.className="letter-box"
box.textContent = letter === "_" ? "" : letter

row.appendChild(box)

})

container.appendChild(row)

})

}

function nextSinger(){

if(queue.length===0)queue=shuffle([...singers])

current=queue.shift().toUpperCase()

revealed=current.split("").map(c=>c===" "?" ":"_")

renderBoxes()

let hidden=current.split("").map((c,i)=>c===" "?null:i).filter(i=>i!==null)

clearInterval(revealTimer)

revealTimer=setInterval(()=>{

if(hidden.length===0)return

let r=hidden.splice(Math.floor(Math.random()*hidden.length),1)[0]
revealed[r]=current[r]
renderBoxes()

},2000)

}

function submitGuess(){

let guess=document.getElementById("guessInput").value.toUpperCase().trim()
document.getElementById("guessInput").value=""

if(guess===current){

correct++
document.getElementById("score").textContent="Correct: "+correct+" / 5"
document.getElementById("message").textContent="✅ Correct!"

setTimeout(()=>{
document.getElementById("message").textContent=""
},800)

if(correct===5){
endGame(true)
}else{
nextSinger()
}

}else{

document.getElementById("message").textContent="❌ Try again"

setTimeout(()=>{
document.getElementById("message").textContent=""
},1200)

}

}
function endGame(win){

clearInterval(timer)
clearInterval(revealTimer)

let score = win ? time : 0

document.getElementById("finalScore").textContent = score
document.getElementById("gameOverModal").style.display="flex"

if(score > high){
high = score
localStorage.setItem("spellHigh", score)
document.getElementById("highscore").textContent="High Score: "+score
}

}

function restartGame(){

document.getElementById("gameOverModal").style.display="none"
startGame()

}

document.getElementById("guessInput").addEventListener("keypress",e=>{
if(e.key==="Enter")submitGuess()
})

startGame()

</script>

</body>
</html>
