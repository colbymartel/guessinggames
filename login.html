<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Guessing Games</title>
  <link rel="icon" href="/favicongg.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #eef2fa;
      --border: #e2e0db;
      --border-strong: #c8c5be;
      --text: #1a1a18;
      --muted: #7a786f;
      --accent: #2357a4;
      --accent-bright: #3a6fc4;
      --accent-deep: #1a4580;
      --accent-dim: #eef2fa;
      --accent-glow: rgba(35, 87, 164, .14);
      --accent-soft: rgba(35, 87, 164, .08);
      --sans: 'DM Sans', system-ui, sans-serif;
      --display: 'Oswald', sans-serif;
      --mega: 'Bebas Neue', Impact, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { min-height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(35, 87, 164, .06);
      padding: 0 32px;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-links { display: flex; gap: 2px; flex-wrap: wrap; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .nav-links a:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .nav-search {
      height: 34px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      outline: none;
      width: 180px;
      transition: border-color .15s, width .25s, box-shadow .15s;
    }
    .nav-search:focus {
      border-color: var(--accent);
      width: 220px;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .nav-search::placeholder { color: var(--muted); }
    .nav-login {
      height: 34px;
      padding: 0 18px;
      background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 45%, var(--accent-deep) 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .12s, filter .15s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(35, 87, 164, .25);
    }
    .nav-login:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .nav-login:active { transform: translateY(0); }

    .login-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 56px;
      width: 100%;
    }

    .login-box {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px 18px 2px 18px;
      padding: 36px 40px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(35, 87, 164, .1);
      overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(35, 87, 164, .07) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    .login-box::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
      pointer-events: none;
    }

    .login-eyebrow {
      position: relative;
      z-index: 1;
      font-family: var(--mega);
      font-size: 14px;
      letter-spacing: .38em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .login-box h1 {
      position: relative;
      z-index: 1;
      font-family: var(--mega);
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 400;
      letter-spacing: .04em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }
    .login-box h1 span { color: var(--accent); }
    .login-sub {
      position: relative;
      z-index: 1;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .login-box input[type="text"],
    .login-box input[type="password"] {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .login-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .login-box input::placeholder { color: var(--muted); }

    .login-box .submit-btn {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 45%, var(--accent-deep) 100%);
      color: #fff;
      font-family: var(--display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform .12s, filter .15s, box-shadow .15s;
      box-shadow: 0 4px 14px rgba(35, 87, 164, .28);
    }
    .login-box .submit-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .login-box .submit-btn:active { transform: translateY(0); }

    .footer-text {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }
    .footer-text a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .footer-text a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      nav { padding: 0 16px; }
      .nav-search { width: 140px; }
      .nav-search:focus { width: 160px; }
      .login-box { padding: 28px 22px 32px; }
    }
    @media (max-width: 520px) {
      .nav-actions .nav-search { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/allgames.html">Games</a>
      <a href="/about.html">About</a>
    </div>
    <div class="nav-actions">
      <input type="text" class="nav-search" placeholder="Search games…" aria-label="Search games">
      <button type="button" class="nav-login">Login</button>
    </div>
  </nav>

  <main class="login-main">
    <div class="login-box">
      <p class="login-eyebrow">Guessing Games</p>
      <h1>Log in to <span>play</span></h1>
      <p class="login-sub">Use your username to sign in and unlock voting on the Hall of Fame.</p>
      <input type="text" placeholder="Username" required autocomplete="username">
      <input type="password" placeholder="Password" required autocomplete="current-password">
      <button type="button" class="submit-btn">Sign in</button>
      <div class="footer-text">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var box = document.querySelector(".login-box");
      if (!box) return;
      var user = box.querySelector('input[type="text"]');
      var btn = box.querySelector(".submit-btn");
      if (!btn) return;
      btn.addEventListener("click", function (e) {
        e.preventDefault();
        if (!user || !user.value.trim()) return;
        try {
          localStorage.setItem("ggLoggedIn", "true");
          localStorage.setItem("ggUsername", user.value.trim());
        } catch (err) {}
        window.location.href = "/index.html";
      });
      document.querySelector(".nav-login")?.addEventListener("click", function () {
        user?.focus();
      });
    })();
  </script>
</body>
</html>
