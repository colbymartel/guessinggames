<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guess The College - Guessing Games</title>

<link rel="icon" href="/favicongg.ico">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
min-height:100vh;
color:#333;
}

nav{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav a{
margin-right:15px;
text-decoration:none;
font-weight:600;
color:#333;
}

header{
text-align:center;
padding:30px;
background:white;
box-shadow:0 2px 20px rgba(0,0,0,.1);
}

header h1{
font-size:2.4rem;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.main{
max-width:900px;
margin:auto;
padding:30px;
width:100%;
}

.game{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

.stats{
background:#f3f7fb;
padding:12px 20px;
border-radius:999px;
display:inline-block;
font-weight:700;
margin-bottom:20px;
}

.divider{margin:0 10px;color:#bbb;}

.clues{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
max-width:600px;
margin:20px auto;
perspective:1000px;
}

.card{
height:120px;
position:relative;
transform-style:preserve-3d;
transition:transform .6s;
}

.card.flip{transform:rotateY(180deg)}

.face{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-weight:700;
backface-visibility:hidden;
}

.front{
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
}

.back{
background:white;
border:2px solid #e0e0e0;
transform:rotateY(180deg);
}

.logo{
max-width:70px;
max-height:70px;
}

input{
margin-top:15px;
padding:12px;
border-radius:20px;
border:2px solid #ddd;
width:250px;
font-size:1rem;
}

button{
margin-top:12px;
padding:12px 20px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

#message{
margin-top:15px;
font-weight:700;
font-size:1.1rem;
}

footer{
margin-top:auto;
background:white;
padding:20px;
text-align:center;
}

/* MODAL */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal{
background:white;
padding:30px;
border-radius:22px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.modal h2{
font-size:1.8rem;
margin-bottom:10px;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.modal button{
margin-top:15px;
}

</style>
</head>

<body>

<nav>
<div>
<a href="/index.html">Home</a>
<a href="/allgames.html">Games</a>
<a href="/about.html">About</a>
</div>
</nav>

<header>
<h1>🎓 Guess The College</h1>
<p>Use the clues to guess the college before time runs out.</p>
</header>

<div class="main">
<div class="game">

<div class="stats">
<span id="timer">Time: 100</span>
<span class="divider">|</span>
<span id="score">Score: 0</span>
<span class="divider">|</span>
<span id="highscore">High Score: 0</span>
</div>

<div class="clues">

<div class="card" id="card1">
<div class="face front">Acceptance Rate</div>
<div class="face back" id="rate"></div>
</div>

<div class="card" id="card2">
<div class="face front">State</div>
<div class="face back" id="state"></div>
</div>

<div class="card" id="card3">
<div class="face front">Mascot</div>
<div class="face back" id="mascot"></div>
</div>

<div class="card" id="card4">
<div class="face front">Logo</div>
<div class="face back">
<img id="logo" class="logo">
</div>
</div>

</div>

<input id="guess" placeholder="Type college name">

<br>

<button onclick="submitGuess()">Submit</button>
<button onclick="passCollege()">Pass (-5s)</button>

<div id="message"></div>

</div>
</div>

<div class="modal-overlay" id="gameOverModal">
<div class="modal">
<h2>Game Over</h2>
<p>Your final score:</p>
<div style="font-weight:700;font-size:1.3rem" id="finalScore"></div>
<button onclick="restartGame()">Play Again</button>
</div>
</div>

<footer>
© 2026 Guessing Games
</footer>

<script>

const colleges=[
{name:"Harvard",answers:["harvard"],rate:"4.6%",state:"Massachusetts",mascot:"Crimson",logo:"https://logo.clearbit.com/harvard.edu"},
{name:"MIT",answers:["mit"],rate:"6.7%",state:"Massachusetts",mascot:"Beaver",logo:"https://logo.clearbit.com/mit.edu"},
{name:"Stanford",answers:["stanford"],rate:"4.3%",state:"California",mascot:"Tree",logo:"https://logo.clearbit.com/stanford.edu"},
{name:"Yale",answers:["yale"],rate:"5.9%",state:"Connecticut",mascot:"Bulldog",logo:"https://logo.clearbit.com/yale.edu"},
{name:"Princeton",answers:["princeton"],rate:"5.6%",state:"New Jersey",mascot:"Tiger",logo:"https://logo.clearbit.com/princeton.edu"},
{name:"Columbia",answers:["columbia"],rate:"5.1%",state:"New York",mascot:"Lion",logo:"https://logo.clearbit.com/columbia.edu"},
{name:"Penn",answers:["penn","upenn"],rate:"7.4%",state:"Pennsylvania",mascot:"Quaker",logo:"https://logo.clearbit.com/upenn.edu"},
{name:"Brown",answers:["brown"],rate:"7.7%",state:"Rhode Island",mascot:"Bear",logo:"https://logo.clearbit.com/brown.edu"},
{name:"Cornell",answers:["cornell"],rate:"10.6%",state:"New York",mascot:"Big Red",logo:"https://logo.clearbit.com/cornell.edu"},
{name:"Dartmouth",answers:["dartmouth"],rate:"8.8%",state:"New Hampshire",mascot:"Big Green",logo:"https://logo.clearbit.com/dartmouth.edu"},
{name:"NYU",answers:["nyu"],rate:"16%",state:"New York",mascot:"Bobcat",logo:"https://logo.clearbit.com/nyu.edu"},
{name:"UCLA",answers:["ucla"],rate:"12%",state:"California",mascot:"Bruin",logo:"https://logo.clearbit.com/ucla.edu"},
{name:"USC",answers:["usc"],rate:"12%",state:"California",mascot:"Trojan",logo:"https://logo.clearbit.com/usc.edu"}
]

let current
let score=0
let time=100
let high=localStorage.getItem("collegeHigh")||0
let timer
let clueTimer
let clueIndex=0
let gameActive=true

document.getElementById("highscore").textContent="High Score: "+high

function randomCollege(){

current=colleges[Math.floor(Math.random()*colleges.length)]

document.getElementById("rate").textContent=current.rate
document.getElementById("state").textContent=current.state
document.getElementById("mascot").textContent=current.mascot
document.getElementById("logo").src=current.logo

resetCards()

setTimeout(()=>{
document.getElementById("card1").classList.add("flip")
clueIndex=1
startClues()
},150)

}

function resetCards(){
for(let i=1;i<=4;i++){
document.getElementById("card"+i).classList.remove("flip")
}
clearInterval(clueTimer)
clueIndex=0
}

function startClues(){
clueTimer=setInterval(()=>{
if(clueIndex<4){
clueIndex++
document.getElementById("card"+clueIndex).classList.add("flip")
}else{
clearInterval(clueTimer)
}
},3000)
}

function submitGuess(){

if(!gameActive)return

let input=document.getElementById("guess")
let guess=input.value.toLowerCase()

if(current.answers.some(a=>guess.includes(a))){

score++
document.getElementById("score").textContent="Score: "+score
document.getElementById("message").textContent="✅ Correct!"
input.value=""

setTimeout(()=>{
document.getElementById("message").textContent=""
randomCollege()
},900)

}else{

document.getElementById("message").textContent="❌ Try again"
input.value=""

}

}

function passCollege(){

if(!gameActive)return

let input=document.getElementById("guess")

time=Math.max(0,time-5)
document.getElementById("timer").textContent="Time: "+time

document.getElementById("message").textContent="Answer: "+current.name
input.value=""

for(let i=1;i<=4;i++){
document.getElementById("card"+i).classList.add("flip")
}

setTimeout(()=>{
document.getElementById("message").textContent=""
randomCollege()
},1800)

}

function endGame(){

gameActive=false

clearInterval(timer)
clearInterval(clueTimer)

document.getElementById("finalScore").textContent=score
document.getElementById("gameOverModal").style.display="flex"

if(score>high){
localStorage.setItem("collegeHigh",score)
}

}

function startGame(){

gameActive=true
score=0
time=100

document.getElementById("score").textContent="Score: 0"
document.getElementById("timer").textContent="Time: 100"

randomCollege()

timer=setInterval(()=>{

if(!gameActive)return

time--
document.getElementById("timer").textContent="Time: "+time

if(time<=0){
endGame()
}

},1000)

}

function restartGame(){

document.getElementById("gameOverModal").style.display="none"

startGame()

}

document.getElementById("guess").addEventListener("keypress",e=>{
if(e.key==="Enter")submitGuess()
})

startGame()

</script>

</body>
</html>
