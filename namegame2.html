<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name of the Day — Guessing Games</title>
  <link rel="icon" href="/favicongg.ico" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e2e0db;
      --border-strong: #c8c5be;
      --accent: #2357a4;
      --accent-dim: #eef2fa;
      --text: #1a1a18;
      --muted: #7a786f;
      --green: #1a9952;
      --green-bg: #edfaf3;
      --green-text: #1a6640;
      --green-border: #b6e8ce;
      --yellow: #b07d00;
      --yellow-bg: #fdf8e7;
      --yellow-border: #f0d97a;
      --red-bg: #fdeeed;
      --red-text: #8b2a2a;
      --red-border: #f2c0bc;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color .15s, background .15s;
      letter-spacing: .01em;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg); }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .nav-search {
      height: 34px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      outline: none;
      width: 180px;
      transition: border-color .15s, width .25s;
    }
    .nav-search:focus { border-color: var(--accent); width: 220px; }
    .nav-search::placeholder { color: var(--muted); }
    .nav-login {
      height: 34px;
      padding: 0 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .nav-login:hover { opacity: .8; }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 40px 32px 36px;
      text-align: center;
    }
    header h1 {
      font-family: var(--serif);
      font-size: 2.6rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -.01em;
      line-height: 1.1;
    }
    header h1 em { color: var(--accent); font-style: italic; }
    header p {
      font-size: 14px;
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
      font-weight: 400;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 32px 24px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── HUD ── */
    .hud {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: .01em;
    }
    .stat-chip strong { color: var(--text); font-weight: 600; }
    .stat-chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .5;
    }
    .stat-chip.attempts .dot { background: #e85d00; }
    .stat-chip.timer .dot { background: #2357a4; }

    /* ── GAME CARD ── */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: visible;
      margin-bottom: 16px;
    }

    /* previous guess row */
    .guess-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-radius: 16px 16px 0 0;
    }
    .guess-header span {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .guess-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .6;
    }

    .tiles-body {
      padding: 20px 24px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tiles-empty {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    /* tiles */
    .tile {
      width: 46px;
      height: 52px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      font-family: var(--serif);
      letter-spacing: .02em;
      transition: transform .15s;
    }
    .tile.correct { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .tile.present { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .tile.wrong   { background: var(--red-bg);    color: var(--red-text); border-color: var(--red-border); }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-row {
      display: flex;
      gap: 0;
      width: 100%;
    }
    .guess-input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .guess-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(35,87,164,.1);
      background: var(--surface);
    }
    .guess-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
    .guess-input:read-only { cursor: default; }

    .input-btns {
      display: flex;
      gap: 8px;
    }
    .input-btns .btn { flex: 1; justify-content: center; }

    .btn {
      height: 42px;
      padding: 0 18px;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all .15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #1c4a8a; border-color: #1c4a8a; }
    .btn-ghost {
      background: var(--surface);
      color: var(--muted);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── FEEDBACK ── */
    .feedback {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
    }
    .feedback.good {
      background: var(--green-bg);
      color: var(--green-text);
      border-color: var(--green-border);
      display: block;
    }
    .feedback.bad {
      background: var(--red-bg);
      color: var(--red-text);
      border-color: var(--red-border);
      display: block;
    }
    .feedback.info {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: #c5d9f5;
      display: block;
    }

    /* ── KEYBOARD ── */
    .keyboard-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .key-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 5px;
    }
    .key-row:last-child { margin-bottom: 0; }
    .key {
      height: 44px;
      min-width: 36px;
      padding: 0 6px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: background .1s, color .1s, border-color .1s, transform .1s;
    }
    .key:active { transform: scale(.94); }
    .key.wide { min-width: 58px; font-size: 12px; }
    .key.correct { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .key.present { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
    .key.wrong   { background: var(--red-bg);    color: var(--red-text);  border-color: var(--red-border); }

    /* ── BOTTOM ROW ── */
    .bottom-row {
      display: flex;
      justify-content: flex-end;
      padding: 0 4px;
      gap: 8px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-copy { font-size: 12px; color: var(--muted); }
    .footer-links { display: flex; gap: 16px; }
    .footer-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .nav-search { width: 120px; }
      header { padding: 28px 20px 24px; }
      header h1 { font-size: 2rem; }
      .main { padding: 20px 16px; }
      .key { min-width: 30px; height: 48px; }
      .key.wide { min-width: 50px; }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/allgames.html">Games</a>
      <a href="/about.html">About</a>
    </div>
    <div class="nav-actions">
      <input type="text" class="nav-search" placeholder="Search games…">
      <button class="nav-login">Login</button>
    </div>
  </nav>

  <header>
    <h1>Name of the <em>Day</em></h1>
    <p>Guess the mystery celebrity name. Green = right letter, right spot. Yellow = right letter, wrong spot.</p>
  </header>

  <div class="main">

    <!-- HUD -->
    <div class="hud">
      <div class="stat-chip attempts">
        <span class="dot"></span>
        Attempts <strong id="attemptCount">0</strong>
      </div>
      <div class="stat-chip timer">
        <span class="dot"></span>
        Time <strong id="timer">0:00</strong>
      </div>
    </div>

    <!-- Game card -->
    <div class="game-card">
      <div class="guess-header">
        <div class="guess-dot"></div>
        <span>Last guess</span>
      </div>
      <div class="tiles-body" id="tilesBody">
        <span class="tiles-empty">Your guess will appear here</span>
      </div>
      <div class="input-area">
        <div class="input-row">
          <input
            id="guessInput"
            class="guess-input"
            type="text"
            placeholder="Type a name…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="input-btns">
          <button class="btn btn-primary" id="submitBtn">Submit</button>
          <button class="btn btn-ghost" id="shareBtn" style="display:none">Share score</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-wrap">
      <div id="keyboard"></div>
    </div>

    <div class="bottom-row">
      <button class="btn btn-ghost" id="newGameBtn">New game</button>
    </div>

  </div>

  <footer>
    <span class="footer-copy">© 2026 Guessing Games</span>
    <div class="footer-links">
      <a href="https://www.instagram.com/colbymartel19/">Instagram</a>
      <a href="https://www.youtube.com/ColbyMartel">YouTube</a>
      <a href="https://www.tiktok.com/@ColbyMartel">TikTok</a>
    </div>
  </footer>

  <script>
    let nameBank = [];
    let target = "VINCENT";
    let attempts = 0;
    let seconds = 0;
    let gameOver = false;
    let keyStates = {};

    const elInput    = document.getElementById("guessInput");
    const elFeedback = document.getElementById("feedback");
    const elTiles    = document.getElementById("tilesBody");
    const elAttempts = document.getElementById("attemptCount");
    const elTimer    = document.getElementById("timer");
    const elSubmit   = document.getElementById("submitBtn");
    const elShare    = document.getElementById("shareBtn");

    /* ── TIMER ── */
    function formatTime(s) {
      return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
    }
    setInterval(() => {
      if (!gameOver) { seconds++; elTimer.textContent = formatTime(seconds); }
    }, 1000);

    /* ── LOAD NAMES ── */
    fetch("names.json")
      .then(r => r.json())
      .then(data => {
        nameBank = data.names.map(n => n.toUpperCase());
        target = nameBank[Math.floor(Math.random() * nameBank.length)];
      })
      .catch(() => {
        // fallback demo names if fetch fails
        nameBank = ["VINCENT","MICHAEL","TAYLOR","SELENA","ARIANA","BEYONCE","EMINEM","SHAKIRA","RIHANNA","MADONNA"];
        target = nameBank[Math.floor(Math.random() * nameBank.length)];
      });

    /* ── KEYBOARD ── */
    const LAYOUT = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];

    function buildKeyboard() {
      const kb = document.getElementById("keyboard");
      kb.innerHTML = "";
      LAYOUT.forEach(row => {
        const rowDiv = document.createElement("div");
        rowDiv.className = "key-row";
        row.split("").forEach(l => rowDiv.appendChild(makeKey(l)));
        kb.appendChild(rowDiv);
      });
      const bottom = document.createElement("div");
      bottom.className = "key-row";
      bottom.appendChild(makeKey("ENTER", true));
      bottom.appendChild(makeKey("⌫", true));
      kb.appendChild(bottom);
    }

    function makeKey(letter, wide = false) {
      const k = document.createElement("div");
      k.className = "key" + (wide ? " wide" : "");
      k.textContent = letter;
      k.dataset.key = letter;
      k.addEventListener("click", () => handleKey(letter));
      return k;
    }

    function handleKey(key) {
      if (gameOver) return;
      if (key === "ENTER") { submitGuess(); return; }
      if (key === "⌫") { elInput.value = elInput.value.slice(0, -1); return; }
      elInput.value += key;
    }

    function updateKeyColors(guess, result) {
      guess.split("").forEach((letter, i) => {
        const state = result[i];
        const prev = keyStates[letter];
        // priority: correct > present > wrong
        if (prev === "correct") return;
        if (state === "correct" || (state === "present" && prev !== "correct") || (state === "wrong" && !prev)) {
          keyStates[letter] = state;
        }
      });
      document.querySelectorAll(".key[data-key]").forEach(k => {
        const s = keyStates[k.dataset.key];
        k.className = "key" + (k.classList.contains("wide") ? " wide" : "") + (s ? " " + s : "");
      });
    }

    /* ── INPUT ── */
    elInput.addEventListener("keydown", e => { if (e.key === "Enter") submitGuess(); });
    // show typed letters in uppercase
    elInput.addEventListener("input", () => {
      elInput.value = elInput.value.toUpperCase().replace(/[^A-Z]/g, "");
    });

    /* ── TOUCH DEVICES: use on-screen keyboard ── */
    const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isTouch) {
      elInput.addEventListener("focus", e => { e.preventDefault(); elInput.blur(); });
    }

    /* ── SUBMIT ── */
    function submitGuess() {
      const guess = elInput.value.toUpperCase().trim();
      if (!guess || gameOver) return;

      if (nameBank.length && !nameBank.includes(guess)) {
        setFeedback("bad", "Not in our name list — try another name.");
        elInput.value = "";
        return;
      }

      attempts++;
      elAttempts.textContent = attempts;

      // score the guess
      const tArr = target.split("");
      const gArr = guess.split("");
      const result = new Array(gArr.length).fill("wrong");
      const counts = {};
      tArr.forEach(c => counts[c] = (counts[c] || 0) + 1);

      // pass 1: correct
      gArr.forEach((c, i) => {
        if (c === tArr[i]) { result[i] = "correct"; counts[c]--; }
      });
      // pass 2: present
      gArr.forEach((c, i) => {
        if (result[i] !== "correct" && counts[c] > 0) {
          result[i] = "present"; counts[c]--;
        }
      });

      renderTiles(gArr, result);
      updateKeyColors(guess, result);

      if (guess === target) {
        gameOver = true;
        setFeedback("good", `🎉 Correct! The name was ${target}. Solved in ${attempts} attempt${attempts !== 1 ? "s" : ""} — ${formatTime(seconds)}.`);
        elShare.style.display = "inline-flex";
        elSubmit.disabled = true;
      } else {
        const lenMsg = guess.length < target.length
          ? `The name is longer than ${guess.length} letters.`
          : guess.length > target.length
            ? `The name is shorter than ${guess.length} letters.`
            : `✓ The name has ${target.length} letters.`;
        setFeedback("info", lenMsg);
      }

      elInput.value = "";
    }

    function renderTiles(letters, result) {
      elTiles.innerHTML = "";
      letters.forEach((l, i) => {
        const t = document.createElement("div");
        t.className = "tile " + result[i];
        t.textContent = l;
        elTiles.appendChild(t);
      });
    }

    function setFeedback(type, msg) {
      elFeedback.className = "feedback " + type;
      elFeedback.textContent = msg;
    }

    /* ── SHARE ── */
    elShare.addEventListener("click", () => {
      const text = `I guessed today's Name of the Day in ${attempts} attempt${attempts !== 1 ? "s" : ""} (${formatTime(seconds)})! Play at guessinggames.com`;
      navigator.clipboard.writeText(text).then(() => {
        elShare.textContent = "Copied!";
        setTimeout(() => elShare.textContent = "Share score", 2000);
      });
    });

    /* ── NEW GAME ── */
    document.getElementById("newGameBtn").addEventListener("click", () => {
      attempts = 0; seconds = 0; gameOver = false; keyStates = {};
      elAttempts.textContent = "0";
      elTimer.textContent = "0:00";
      elFeedback.className = "feedback";
      elFeedback.textContent = "";
      elTiles.innerHTML = `<span class="tiles-empty">Your guess will appear here</span>`;
      elShare.style.display = "none";
      elSubmit.disabled = false;
      elInput.value = "";
      if (nameBank.length) target = nameBank[Math.floor(Math.random() * nameBank.length)];
      buildKeyboard();
    });

    /* ── PHYSICAL KEYBOARD ── */
    document.addEventListener("keydown", e => {
      if (gameOver) return;
      if (e.key === "Enter") { submitGuess(); return; }
      if (e.key === "Backspace") { elInput.value = elInput.value.slice(0, -1); return; }
      if (/^[a-zA-Z]$/.test(e.key)) {
        elInput.value += e.key.toUpperCase();
      }
    });

    buildKeyboard();
  </script>
</body>
</html>
