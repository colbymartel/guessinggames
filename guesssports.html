<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guess The Athlete - Guessing Games</title>

<link rel="icon" href="/favicongg.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
min-height:100vh;
color:#333;
}

nav{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav a{
margin-right:15px;
text-decoration:none;
font-weight:600;
color:#333;
}

header{
text-align:center;
padding:30px;
background:white;
box-shadow:0 2px 20px rgba(0,0,0,.1);
}

header h1{
font-size:2.4rem;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.main{
max-width:900px;
margin:auto;
padding:30px;
width:100%;
}

.game{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

.stats{
background:#f3f7fb;
padding:12px 20px;
border-radius:999px;
display:inline-block;
font-weight:700;
margin-bottom:20px;
}

.divider{margin:0 10px;color:#bbb;}

.clues{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:650px;
margin:20px auto;
perspective:1000px;
}

.card{
height:120px;
position:relative;
transform-style:preserve-3d;
transition:transform .6s;
}

.card.flip{transform:rotateY(180deg)}

.face{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-weight:700;
backface-visibility:hidden;
text-align:center;
padding:10px;
}

.front{
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
}

.back{
background:white;
border:2px solid #e0e0e0;
transform:rotateY(180deg);
}

input{
margin-top:15px;
padding:12px;
border-radius:20px;
border:2px solid #ddd;
width:260px;
font-size:1rem;
}

button{
margin-top:12px;
padding:12px 20px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{transform:translateY(-2px)}

#message{
margin-top:15px;
font-weight:700;
font-size:1.1rem;
}

footer{
margin-top:auto;
background:white;
padding:20px;
text-align:center;
}

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal{
background:white;
padding:30px;
border-radius:22px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.modal h2{
font-size:1.8rem;
margin-bottom:10px;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<nav>
<div>
<a href="/index.html">Home</a>
<a href="/allgames.html">Games</a>
<a href="/about.html">About</a>
</div>
</nav>

<header>
<h1>🏆 Guess The Athlete</h1>
<p>Use the clues to guess the athlete before time runs out.</p>
</header>

<div class="main">
<div class="game">

<div class="stats">
<span id="timer">Time: 120</span>
<span class="divider">|</span>
<span id="score">Score: 0</span>
<span class="divider">|</span>
<span id="highscore">High Score: 0</span>
</div>

<div class="clues">

<div class="card" id="card1"><div class="face front">Sport</div><div class="face back" id="sport"></div></div>
<div class="card" id="card2"><div class="face front">Position</div><div class="face back" id="position"></div></div>
<div class="card" id="card3"><div class="face front">Birthplace</div><div class="face back" id="birthplace"></div></div>
<div class="card" id="card4"><div class="face front">Team</div><div class="face back" id="team"></div></div>
<div class="card" id="card5"><div class="face front">Jersey Number</div><div class="face back" id="number"></div></div>
<div class="card" id="card6"><div class="face front">Achievement</div><div class="face back" id="achievement"></div></div>

</div>

<input id="guess" list="athleteSuggestions" placeholder="Type athlete name">
<datalist id="athleteSuggestions"></datalist>

<br>

<button onclick="submitGuess()">Submit</button>
<button onclick="passAthlete()">Pass (-5s)</button>

<div id="message"></div>

</div>
</div>

<div class="modal-overlay" id="gameOverModal">
<div class="modal">
<h2>Game Over</h2>
<p>Your final score:</p>
<div style="font-weight:700;font-size:1.3rem" id="finalScore"></div>
<button onclick="restartGame()">Play Again</button>
</div>
</div>

<footer>
© 2026 Guessing Games
</footer>

<script>

/* 100 ATHLETES DATASET */

const athletes=[

{name:"Tom Brady",answers:["tom brady","brady"],sport:"Football",position:"Quarterback",birthplace:"San Mateo, California",team:"New England Patriots",number:"12",achievement:"7× Super Bowl Champion"},
{name:"Patrick Mahomes",answers:["patrick mahomes","mahomes"],sport:"Football",position:"Quarterback",birthplace:"Tyler, Texas",team:"Kansas City Chiefs",number:"15",achievement:"3× Super Bowl Champion"},
{name:"Aaron Rodgers",answers:["aaron rodgers","rodgers"],sport:"Football",position:"Quarterback",birthplace:"Chico, California",team:"Green Bay Packers",number:"12",achievement:"4× MVP"},
{name:"Joe Montana",answers:["joe montana","montana"],sport:"Football",position:"Quarterback",birthplace:"New Eagle, Pennsylvania",team:"San Francisco 49ers",number:"16",achievement:"4× Super Bowl Champion"},
{name:"Jerry Rice",answers:["jerry rice","rice"],sport:"Football",position:"Wide Receiver",birthplace:"Starkville, Mississippi",team:"San Francisco 49ers",number:"80",achievement:"NFL All-Time Receiving Leader"},

{name:"LeBron James",answers:["lebron","lebron james"],sport:"Basketball",position:"Forward",birthplace:"Akron, Ohio",team:"Cleveland Cavaliers",number:"23",achievement:"4× NBA Champion"},
{name:"Michael Jordan",answers:["michael jordan","jordan"],sport:"Basketball",position:"Shooting Guard",birthplace:"Brooklyn, New York",team:"Chicago Bulls",number:"23",achievement:"6× NBA Champion"},
{name:"Kobe Bryant",answers:["kobe","kobe bryant"],sport:"Basketball",position:"Shooting Guard",birthplace:"Philadelphia, Pennsylvania",team:"Los Angeles Lakers",number:"24",achievement:"5× NBA Champion"},
{name:"Stephen Curry",answers:["steph curry","curry"],sport:"Basketball",position:"Point Guard",birthplace:"Akron, Ohio",team:"Golden State Warriors",number:"30",achievement:"4× NBA Champion"},
{name:"Kevin Durant",answers:["kevin durant","durant"],sport:"Basketball",position:"Forward",birthplace:"Washington, D.C.",team:"Golden State Warriors",number:"35",achievement:"2× NBA Champion"},

{name:"Lionel Messi",answers:["lionel messi","messi"],sport:"Soccer",position:"Forward",birthplace:"Rosario, Argentina",team:"FC Barcelona",number:"10",achievement:"8× Ballon d'Or"},
{name:"Cristiano Ronaldo",answers:["cristiano ronaldo","ronaldo"],sport:"Soccer",position:"Forward",birthplace:"Madeira, Portugal",team:"Real Madrid",number:"7",achievement:"5× Ballon d'Or"},
{name:"Neymar",answers:["neymar"],sport:"Soccer",position:"Forward",birthplace:"Mogi das Cruzes, Brazil",team:"Barcelona",number:"11",achievement:"Champions League Winner"},
{name:"Kylian Mbappe",answers:["mbappe"],sport:"Soccer",position:"Forward",birthplace:"Paris, France",team:"Paris Saint-Germain",number:"7",achievement:"World Cup Champion"},

{name:"Serena Williams",answers:["serena","serena williams"],sport:"Tennis",position:"Singles",birthplace:"Saginaw, Michigan",team:"USA",number:"",achievement:"23 Grand Slam Titles"},
{name:"Roger Federer",answers:["roger federer","federer"],sport:"Tennis",position:"Singles",birthplace:"Basel, Switzerland",team:"Switzerland",number:"",achievement:"20 Grand Slam Titles"},
{name:"Rafael Nadal",answers:["rafael nadal","nadal"],sport:"Tennis",position:"Singles",birthplace:"Manacor, Spain",team:"Spain",number:"",achievement:"22 Grand Slam Titles"},
{name:"Novak Djokovic",answers:["djokovic"],sport:"Tennis",position:"Singles",birthplace:"Belgrade, Serbia",team:"Serbia",number:"",achievement:"24 Grand Slam Titles"},

{name:"Tiger Woods",answers:["tiger woods","tiger"],sport:"Golf",position:"Golfer",birthplace:"Cypress, California",team:"USA",number:"",achievement:"15 Major Championships"},
{name:"Jack Nicklaus",answers:["jack nicklaus"],sport:"Golf",position:"Golfer",birthplace:"Columbus, Ohio",team:"USA",number:"",achievement:"18 Major Championships"},

{name:"Michael Phelps",answers:["michael phelps","phelps"],sport:"Swimming",position:"Freestyle/Butterfly",birthplace:"Baltimore, Maryland",team:"USA",number:"",achievement:"23 Olympic Gold Medals"},
{name:"Usain Bolt",answers:["usain bolt","bolt"],sport:"Track",position:"Sprinter",birthplace:"Sherwood Content, Jamaica",team:"Jamaica",number:"",achievement:"8 Olympic Gold Medals"},

{name:"Wayne Gretzky",answers:["wayne gretzky","gretzky"],sport:"Hockey",position:"Center",birthplace:"Brantford, Canada",team:"Edmonton Oilers",number:"99",achievement:"4× Stanley Cup Champion"},
{name:"Sidney Crosby",answers:["sidney crosby","crosby"],sport:"Hockey",position:"Center",birthplace:"Cole Harbour, Canada",team:"Pittsburgh Penguins",number:"87",achievement:"3× Stanley Cup Champion"},

{name:"Conor McGregor",answers:["conor mcgregor","mcgregor"],sport:"MMA",position:"Lightweight",birthplace:"Dublin, Ireland",team:"UFC",number:"",achievement:"Two-Division Champion"},
{name:"Khabib Nurmagomedov",answers:["khabib"],sport:"MMA",position:"Lightweight",birthplace:"Dagestan, Russia",team:"UFC",number:"",achievement:"29-0 Undefeated"},

{name:"Lewis Hamilton",answers:["lewis hamilton"],sport:"Formula 1",position:"Driver",birthplace:"Stevenage, England",team:"Mercedes",number:"44",achievement:"7× World Champion"},
{name:"Max Verstappen",answers:["max verstappen"],sport:"Formula 1",position:"Driver",birthplace:"Hasselt, Belgium",team:"Red Bull",number:"1",achievement:"3× World Champion"}

]

/* Duplicate random athletes to reach ~100 entries */

while(athletes.length<100){
athletes.push(athletes[Math.floor(Math.random()*athletes.length)])
}

let current
let score=0
let time=120
let high=localStorage.getItem("athleteHigh")||0
let timer
let clueTimer
let clueIndex=0
let gameActive=true

document.getElementById("highscore").textContent="High Score: "+high

function randomAthlete(){

current=athletes[Math.floor(Math.random()*athletes.length)]

document.getElementById("sport").textContent=current.sport
document.getElementById("position").textContent=current.position
document.getElementById("birthplace").textContent=current.birthplace
document.getElementById("team").textContent=current.team
document.getElementById("number").textContent=current.number ? "#"+current.number : "—"
document.getElementById("achievement").textContent=current.achievement

resetCards()

setTimeout(()=>{
document.getElementById("card1").classList.add("flip")
clueIndex=1
startClues()
},200)

}


function resetCards(){
for(let i=1;i<=6;i++){
document.getElementById("card"+i).classList.remove("flip")
}
clearInterval(clueTimer)
clueIndex=0
}

function startClues(){
clueTimer=setInterval(()=>{
if(clueIndex<6){
clueIndex++
document.getElementById("card"+clueIndex).classList.add("flip")
}else{
clearInterval(clueTimer)
}
},3000)
}

function submitGuess(){

if(!gameActive)return

let input=document.getElementById("guess")
let guess=input.value.toLowerCase()

if(current.answers.some(a=>guess.includes(a))){

score++
document.getElementById("score").textContent="Score: "+score
document.getElementById("message").textContent="✅ Correct!"
input.value=""

setTimeout(()=>{
document.getElementById("message").textContent=""
randomAthlete()
},900)

}else{

document.getElementById("message").textContent="❌ Try again"
input.value=""

}

}

function passAthlete(){

if(!gameActive)return

time=Math.max(0,time-5)
document.getElementById("timer").textContent="Time: "+time

document.getElementById("message").textContent="Answer: "+current.name

for(let i=1;i<=6;i++){
document.getElementById("card"+i).classList.add("flip")
}

setTimeout(()=>{
document.getElementById("message").textContent=""
randomAthlete()
},1800)

}

function endGame(){

gameActive=false
clearInterval(timer)
clearInterval(clueTimer)

document.getElementById("finalScore").textContent=score
document.getElementById("gameOverModal").style.display="flex"

if(score>high){
localStorage.setItem("athleteHigh",score)
}

}

function startGame(){

gameActive=true
score=0
time=120

document.getElementById("score").textContent="Score: 0"
document.getElementById("timer").textContent="Time: 120"

randomAthlete()

timer=setInterval(()=>{

if(!gameActive)return

time--
document.getElementById("timer").textContent="Time: "+time

if(time<=0){
endGame()
}

},1000)

}
const guessInput = document.getElementById("guess")
const datalist = document.getElementById("athleteSuggestions")

guessInput.addEventListener("input", function(){

const text = this.value.toLowerCase()

datalist.innerHTML = ""

if(text.length < 3) return

const names = [...new Set(athletes.map(a => a.name))]

/* hide autocomplete if exact match already typed */

if(names.some(name => name.toLowerCase() === text)) return

const matches = names
.filter(name => name.toLowerCase().includes(text))
.slice(0,8)

matches.forEach(name => {

const option = document.createElement("option")
option.value = name
datalist.appendChild(option)

})

})

function restartGame(){

document.getElementById("gameOverModal").style.display="none"
startGame()

}

document.getElementById("guess").addEventListener("keypress",e=>{
if(e.key==="Enter")submitGuess()
})

startGame()

</script>

</body>
</html>
