<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bible Verse Game - Guessing Games</title>

<link rel="icon" href="/favicongg.ico">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
min-height:100vh;
color:#333;
}

nav{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav a{
margin-right:15px;
text-decoration:none;
font-weight:600;
color:#333;
}

header{
text-align:center;
padding:30px;
background:white;
box-shadow:0 2px 20px rgba(0,0,0,.1);
}

header h1{
font-size:2.4rem;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.main{
max-width:900px;
margin:auto;
padding:30px;
width:100%;
}

.game{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.top{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
align-items:center;
}

.pill{
background:#f3f7fb;
padding:10px 14px;
border-radius:999px;
font-weight:700;
}

.heart{
font-size:18px;
margin-right:4px;
}

.verse-card{
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
padding:25px;
border-radius:18px;
margin-bottom:20px;
}

.verse-text{
font-size:1.25rem;
line-height:1.6;
min-height:60px;
}

.choices{
display:grid;
gap:10px;
margin-top:15px;
}

.choice{
padding:14px;
border-radius:12px;
border:none;
background:white;
font-weight:700;
cursor:pointer;
}

.choice:hover{
transform:translateY(-2px);
}

.correct{
background:#e9fff1;
border:2px solid #2ecc71;
}

.wrong{
background:#ffecec;
border:2px solid #e74c3c;
}

.reference{
margin-top:10px;
font-weight:700;
}

.after{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
cursor:pointer;
}

.fav-btn{
background:#f3f7fb;
border:2px solid #3b7bbf;
padding:12px 18px;
border-radius:12px;
font-weight:700;
}

#nextBtn{
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
border:none;
}

footer{
margin-top:auto;
background:white;
padding:20px;
text-align:center;
}
/* OVERLAY */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:999;
animation:fadeIn .25s ease;
}

/* MODAL CARD */

.modal{
background:white;
padding:30px;
border-radius:22px;
width:90%;
max-width:520px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.35);
animation:modalPop .25s ease;
}

/* TITLE */

.modal h2{
font-size:1.8rem;
margin-bottom:8px;
background:linear-gradient(45deg,#3b7bbf,#2a5a8a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */

.modal p{
opacity:.75;
margin-bottom:20px;
}

/* BUTTONS */

.modal button{
background:linear-gradient(135deg,#3b7bbf,#2a5a8a);
color:white;
border:none;
padding:12px 22px;
border-radius:12px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.modal button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* FAVORITES LIST */

#favoritesList{
text-align:left;
max-height:320px;
overflow-y:auto;
margin-top:10px;
padding-right:5px;
}

/* FAVORITE CARD */

.favorite-verse{
position:relative;
background:#f3f7fb;
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:.95rem;
line-height:1.4;
cursor:grab;
}

.remove-fav{
position:absolute;
top:6px;
right:8px;
font-size:14px;
cursor:pointer;
font-weight:700;
color:#888;
}

.remove-fav:hover{
color:#e74c3c;
}

.favorite-verse:active{
cursor:grabbing;
}

.sortable-ghost{
opacity:.4;
}
/* SCROLLBAR */

#favoritesList::-webkit-scrollbar{
width:6px;
}

#favoritesList::-webkit-scrollbar-thumb{
background:#c8d5e8;
border-radius:10px;
}
/* FAVORITES BUTTON */

.favorites-btn{
background:white;
border:2px solid #3b7bbf;
color:#2a5a8a;
padding:10px 18px;
border-radius:999px;
font-weight:700;
cursor:pointer;
transition:.2s;
display:flex;
align-items:center;
gap:6px;
}

.favorites-btn:hover{
background:#3b7bbf;
color:white;
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,.2);
}

.favorites-btn:active{
transform:scale(.96);
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes modalPop{
from{
transform:scale(.9);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body>

<nav>
<div>
<a href="/index.html">Home</a>
<a href="/allgames.html">Games</a>
<a href="/about.html">About</a>
</div>
</nav>

<header>
<h1>📖 Guess the Bible Book</h1>
<p>Read the verse and guess which book it comes from.</p>
</header>

<div class="main">

<div class="game">

<div class="top">

<div class="pill">🔥 Streak: <span id="streak">0</span></div>
<div class="pill">🏆 Best: <span id="best">0</span></div>
<div class="pill">✔ Correct: <span id="correct">0</span></div>

<div class="pill">
<span class="heart" id="h1">❤️</span>
<span class="heart" id="h2">❤️</span>
<span class="heart" id="h3">❤️</span>
</div>

<button class="favorites-btn" onclick="openFavorites()">⭐ Favorites</button>
</div>

<div class="verse-card">

<div class="verse-text" id="verseText"></div>

<div class="choices" id="choices"></div>

<div class="reference" id="reference"></div>

<div class="after">

<button id="favBtn" class="fav-btn" style="display:none">
⭐ Save Verse
</button>

<button id="nextBtn" class="fav-btn" style="display:none">
Next Verse ➜
</button>

</div>

</div>
</div>
</div>
<div class="modal-overlay" id="favoritesModal">
    <div class="modal">
    
    <h2>⭐ Favorite Verses</h2>
    
    <div id="favoritesList"></div>
    
    <br>
    
    <button onclick="closeFavorites()">Close</button>
    
    </div>
    </div>
    <div class="modal-overlay" id="gameOverModal">
        <div class="modal">
        
        <h2>Game Over</h2>
        
        <p>Your streak ended.</p>
        
        <div style="margin:15px 0;font-weight:700;">
        🔥 Streak: <span id="finalStreak"></span><br>
        ✔ Correct: <span id="finalCorrect"></span>
        </div>
        
        <button onclick="restart()">Play Again</button>
        
        </div>
        </div>
<footer>
© 2026 Guessing Games
</footer>
<script>

let VERSES = []
let BOOKS = []

let streak = 0
let best = parseInt(localStorage.getItem("bestStreak")) || 0
let correct = 0
let lives = 3
let current = null
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]")

const verseText = document.getElementById("verseText")
const choices = document.getElementById("choices")
const ref = document.getElementById("reference")
const favBtn = document.getElementById("favBtn")
const nextBtn = document.getElementById("nextBtn")

async function loadVerses(){

const res = await fetch("/verses.json")
VERSES = await res.json()

BOOKS = [...new Set(VERSES.map(v => v.book))]

nextVerse()

}

function shuffle(a){
return [...a].sort(()=>Math.random()-.5)
}

function nextVerse(){

ref.textContent=""
favBtn.style.display="none"
nextBtn.style.display="none"

let next
do{
next = VERSES[Math.floor(Math.random()*VERSES.length)]
}while(next === current)

current = next

verseText.textContent = current.text

const options = shuffle([
current.book,
...shuffle(BOOKS.filter(b => b !== current.book)).slice(0,3)
])

choices.innerHTML=""

options.forEach(book=>{
const btn=document.createElement("button")
btn.className="choice"
btn.textContent=book
btn.onclick=()=>checkAnswer(book,btn)
choices.appendChild(btn)
})

}

loadVerses()

function shuffle(a){
return [...a].sort(()=>Math.random()-.5)
}

function nextVerse(){

ref.textContent=""
favBtn.style.display="none"
nextBtn.style.display="none"

let next
do{
next=VERSES[Math.floor(Math.random()*VERSES.length)]
}while(next===current)

current=next

verseText.textContent=current.text

const options=shuffle([
current.book,
...shuffle(BOOKS.filter(b=>b!==current.book)).slice(0,3)
])

choices.innerHTML=""

options.forEach(book=>{
const btn=document.createElement("button")
btn.className="choice"
btn.textContent=book
btn.onclick=()=>checkAnswer(book,btn)
choices.appendChild(btn)
})

}

function checkAnswer(book,btn){

[...choices.children].forEach(b=>b.disabled=true)

if(book===current.book){

btn.classList.add("correct")
streak++
correct++

if(streak>best){
best=streak
localStorage.setItem("bestStreak",best)
}

}else{

btn.classList.add("wrong")
streak=0
lives--

[...choices.children].forEach(b=>{
if(b.textContent===current.book){
b.classList.add("correct")
}
})

if(lives<=0){

document.getElementById("finalStreak").textContent=streak
document.getElementById("finalCorrect").textContent=correct

document.getElementById("gameOverModal").style.display="flex"

}

}

updateHUD()

ref.textContent=current.ref

favBtn.style.display="inline-block"
nextBtn.style.display="inline-block"

}

function updateHUD(){

document.getElementById("streak").textContent=streak
document.getElementById("best").textContent=best
document.getElementById("correct").textContent=correct

const hearts=["h1","h2","h3"]

hearts.forEach((id,i)=>{
document.getElementById(id).style.opacity=i<lives?1:.3
})

}
function restart(){

document.getElementById("gameOverModal").style.display="none"

lives=3
streak=0
correct=0

updateHUD()
nextVerse()

}

function saveFavorite(v){

if(!favorites.some(f=>f.ref===v.ref)){
favorites.push(v)
localStorage.setItem("favorites",JSON.stringify(favorites))
favBtn.textContent="⭐ Saved!"
}

}

favBtn.onclick=()=>saveFavorite(current)
nextBtn.onclick=nextVerse

function openFavorites(){

const modal=document.getElementById("favoritesModal")
const list=document.getElementById("favoritesList")

list.innerHTML=""

if(favorites.length===0){
list.innerHTML="<p>No favorite verses yet.</p>"
}else{

favorites.forEach(v=>{

const div=document.createElement("div")
div.className="favorite-verse"
div.dataset.ref=v.ref

div.innerHTML=`
<span class="remove-fav" onclick="removeFavorite('${v.ref}')">✕</span>
<strong>${v.ref}</strong><br>
${v.text}
`

list.appendChild(div)

})

}

modal.style.display="flex"

new Sortable(list,{
animation:150,

onEnd:function(){

const newOrder=[]

document.querySelectorAll("#favoritesList .favorite-verse").forEach(card=>{

const verse=favorites.find(v=>v.ref===card.dataset.ref)
if(verse) newOrder.push(verse)

})

favorites=newOrder

localStorage.setItem("favorites",JSON.stringify(favorites))

}

})

}


function closeFavorites(){
document.getElementById("favoritesModal").style.display="none"
}
window.onclick=function(e){
const modal=document.getElementById("favoritesModal")
if(e.target===modal){
modal.style.display="none"
}
}

function removeFavorite(ref){

favorites = favorites.filter(v => v.ref !== ref)

localStorage.setItem("favorites",JSON.stringify(favorites))

openFavorites()

}
updateHUD()
nextVerse()

</script>

</body>
</html>
