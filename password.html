<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows Login Simulator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    .win-screen {
      width: 100vw;
      height: 100vh;
      background: #0a2e0a;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      cursor: default;
      user-select: none;
    }

    .win-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 65% 50%, #1a6b1a 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 50% 30%, #14520a 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 80% 20%, #2a8a2a 0%, transparent 45%),
        radial-gradient(ellipse 70% 70% at 20% 70%, #0d3a0d 0%, transparent 50%),
        linear-gradient(135deg, #071a07 0%, #0e3a0e 30%, #1a6b15 55%, #0a2a0a 100%);
      overflow: hidden;
    }

    .win-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='1920' height='1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,540 Q480,160 960,540 Q1440,920 1920,540' fill='none' stroke='%23ffffff06' stroke-width='160'/%3E%3Cpath d='M0,380 Q700,820 1400,420 Q1700,220 1920,320' fill='none' stroke='%23ffffff04' stroke-width='120'/%3E%3Cpath d='M0,700 Q600,300 1200,650 Q1600,900 1920,580' fill='none' stroke='%23ffffff03' stroke-width='100'/%3E%3C/svg%3E");
      background-size: cover;
      background-position: center;
    }

    .win-logo {
      position: absolute;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
    }

    .divider-line {
      position: absolute;
      top: 55%;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,80,0,0.5) 20%, rgba(0,80,0,0.75) 50%, transparent);
      pointer-events: none;
    }

    .login-center {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .avatar-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(0,120,0,0.5);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .avatar-icon {
      width: 65px; height: 65px;
      fill: rgba(255,255,255,0.88);
    }

    .user-name {
      color: #ffffff;
      font-size: 20px;
      font-weight: 300;
      margin-bottom: 18px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
      letter-spacing: 0.5px;
    }

    .password-row {
      display: flex;
      align-items: center;
      position: relative;
    }

    .password-input {
      width: 230px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(80,180,80,0.55);
      border-right: none;
      color: #fff;
      font-size: 14px;
      padding: 0 38px 0 12px;
      outline: none;
      font-family: inherit;
      letter-spacing: 2px;
      transition: border-color 0.15s, background 0.15s;
    }

    .password-input::placeholder {
      color: rgba(255,255,255,0.5);
      letter-spacing: 0;
      font-size: 12px;
    }

    .password-input:focus {
      border-color: rgba(100,220,100,0.9);
      background: rgba(255,255,255,0.15);
    }

    .pass-eye {
      position: absolute;
      right: 36px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 17px;
      display: flex;
      align-items: center;
      padding: 0 5px;
      height: 36px;
      z-index: 1;
      transition: color 0.15s;
    }

    .pass-eye:hover { color: #fff; }

    .pass-submit {
      width: 36px;
      height: 36px;
      background: rgba(80,180,80,0.4);
      border: 1.5px solid rgba(80,180,80,0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .pass-submit:hover { background: rgba(100,220,100,0.65); }
    .pass-submit:active { background: rgba(100,220,100,0.85); }

    .error-text {
      color: #ff9494;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .hint-link {
      color: rgba(150,220,150,0.7);
      font-size: 12px;
      margin-top: 10px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .hint-link:hover { color: rgba(180,255,180,0.95); }

    .hint-reveal {
      color: rgba(255,255,180,0.9);
      font-size: 12px;
      margin-top: 6px;
      font-style: italic;
      text-align: center;
      display: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .hint-reveal.visible { display: block; }

    /* Bottom-left user accounts */
    .bottom-left {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .user-chip {
      display: flex; align-items: center; gap: 9px;
      background: rgba(0,70,0,0.45);
      padding: 5px 12px 5px 5px;
      border-radius: 2px;
      cursor: pointer;
      color: #fff;
      font-size: 13px;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .user-chip:hover { background: rgba(0,100,0,0.65); }

    .user-chip.active {
      background: rgba(0,110,0,0.6);
      border-color: rgba(80,180,80,0.3);
    }

    .chip-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #2db82d;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: #fff;
      letter-spacing: -0.5px;
    }

    /* Bottom-right branding */
    .bottom-right {
      position: absolute;
      bottom: 20px; right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .brand {
      color: #2db82d;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 0 30px rgba(45,184,45,0.35);
    }

    .brand span { opacity: 0.45; }

    .sys-icons {
      display: flex; gap: 14px;
      color: rgba(255,255,255,0.55);
      font-size: 19px;
    }

    .sys-icon {
      cursor: pointer;
      transition: color 0.15s;
    }
    .sys-icon:hover { color: #fff; }

    /* Success / Desktop overlay */
    .success-overlay {
      position: absolute; inset: 0;
      background: #000;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .success-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Windows 10 Desktop */
    .win10-desktop {
      width: 100%; height: 100%;
      position: relative;
      background:
        radial-gradient(ellipse 55% 70% at 72% 48%, #1a9cd8 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 30% 60%, #0a6fa8 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 10%, #35c8f0 0%, transparent 40%),
        linear-gradient(160deg, #0a4a7a 0%, #0d6db5 35%, #1a9cd8 60%, #0d6db5 100%);
      overflow: hidden;
    }

    /* Wallpaper light streaks */
    .win10-desktop::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='1920' height='1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M-100,400 Q600,200 1400,350 Q1700,400 2000,300' fill='none' stroke='%23ffffff09' stroke-width='200'/%3E%3Cpath d='M-100,600 Q400,350 1000,500 Q1500,600 2000,450' fill='none' stroke='%23ffffff06' stroke-width='150'/%3E%3C/svg%3E");
      background-size: cover;
    }

    /* Desktop Win logo watermark */
    .desktop-winlogo {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-52%);
      opacity: 0.18;
    }

    /* Desktop icons */
    .desktop-icons {
      position: absolute;
      top: 18px; left: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .desk-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 3px;
      cursor: pointer;
      width: 72px;
      transition: background 0.1s;
    }
    .desk-icon:hover { background: rgba(255,255,255,0.15); }
    .desk-icon:active { background: rgba(255,255,255,0.25); }
    .desk-icon-img {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .desk-icon-label {
      color: #fff;
      font-size: 11px;
      text-align: center;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
      line-height: 1.2;
    }

    /* Taskbar */
    .taskbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: rgba(0,20,50,0.78);
      display: flex;
      align-items: center;
      padding: 0 0;
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 10;
    }

    /* Start button */
    .tb-start {
      width: 52px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tb-start:hover { background: rgba(255,255,255,0.1); }
    .tb-start svg { width: 18px; height: 18px; }

    /* Search bar */
    .tb-search {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
      height: 32px;
      padding: 0 10px;
      margin: 0 4px;
      width: 200px;
      cursor: text;
    }
    .tb-search i { color: rgba(255,255,255,0.5); font-size: 14px; }
    .tb-search span { color: rgba(255,255,255,0.45); font-size: 12px; }

    /* Task view */
    .tb-taskview {
      width: 44px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(255,255,255,0.7); font-size: 17px;
      transition: background 0.15s;
    }
    .tb-taskview:hover { background: rgba(255,255,255,0.1); }

    /* Pinned apps */
    .tb-apps {
      display: flex; align-items: center;
      gap: 2px;
      margin: 0 4px;
    }
    .tb-app {
      width: 44px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
      position: relative;
      transition: background 0.15s;
      border-radius: 0;
    }
    .tb-app:hover { background: rgba(255,255,255,0.1); }
    .tb-app-dot {
      position: absolute;
      bottom: 5px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #4fc3f7;
    }

    /* System tray */
    .tb-tray {
      margin-left: auto;
      display: flex; align-items: center;
      gap: 0;
    }
    .tb-tray-icons {
      display: flex; align-items: center; gap: 2px;
      padding: 0 8px; height: 48px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tb-tray-icons:hover { background: rgba(255,255,255,0.1); }
    .tb-tray-icons i { color: rgba(255,255,255,0.8); font-size: 14px; }
    .tb-clock {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 12px; height: 48px;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 80px;
    }
    .tb-clock:hover { background: rgba(255,255,255,0.1); }
    .tb-clock-time { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 400; }
    .tb-clock-date { color: rgba(255,255,255,0.7); font-size: 11px; }
    .tb-notif {
      width: 36px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(255,255,255,0.7); font-size: 16px;
      transition: background 0.15s;
    }
    .tb-notif:hover { background: rgba(255,255,255,0.1); }

    /* Right-click context menu */
    .ctx-menu {
      position: absolute;
      background: rgba(30,40,60,0.97);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 4px 0;
      width: 200px;
      display: none;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .ctx-menu.open { display: block; }
    .ctx-item {
      padding: 8px 16px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.12); }
    .ctx-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 3px 0; }

    /* Lock button */
    .lock-btn {
      position: absolute;
      top: 16px; right: 16px;
      padding: 7px 16px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s;
      z-index: 20;
      display: flex; align-items: center; gap: 6px;
    }
    .lock-btn:hover { background: rgba(0,0,0,0.55); }

    /* Shake animation */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-7px); }
      80% { transform: translateX(7px); }
    }

    .shake { animation: shake 0.4s ease; }

    /* Fade-in on load */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .login-center { animation: fadeIn 0.8s ease; }
    .bottom-left { animation: fadeIn 1s ease 0.3s both; }
    .bottom-right { animation: fadeIn 1s ease 0.3s both; }
  </style>
</head>
<body>
  <div class="win-screen" id="winScreen">
    <div class="win-bg"></div>

    <div class="win-logo">
      <svg width="300" height="290" viewBox="0 0 300 290" xmlns="http://www.w3.org/2000/svg">
        <!-- Windows 10 logo shape: 4 perspective panes converging to center -->
        <!-- Top-left: skewed trapezoid, left edge raised -->
        <polygon points="0,34  138,0  138,133  0,133" fill="#22aa22"/>
        <!-- Top-right: right side is vertical, top-right corner raised -->
        <polygon points="148,0  300,22  300,133  148,133" fill="#22aa22"/>
        <!-- Bottom-left: left edge lower, converges to center -->
        <polygon points="0,143  138,143  138,278  0,256" fill="#22aa22"/>
        <!-- Bottom-right: right side vertical, bottom-right corner lower -->
        <polygon points="148,143  300,143  300,268  148,278" fill="#22aa22"/>
      </svg>
    </div>

    <div class="divider-line"></div>

    <div class="login-center">
      <div class="avatar-circle">
        <svg class="avatar-icon" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="20" r="13"/>
          <ellipse cx="30" cy="47" rx="20" ry="12"/>
        </svg>
      </div>
      <div class="user-name" id="displayName">User</div>
      <div class="password-row">
        <input
          type="password"
          class="password-input"
          id="passInput"
          placeholder="Password"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="pass-eye" id="eyeBtn" title="Show password" tabindex="-1">
          <i class="ti ti-eye"></i>
        </button>
        <button class="pass-submit" id="submitBtn" title="Sign in">
          <i class="ti ti-arrow-right"></i>
        </button>
      </div>
      <div class="error-text" id="errorMsg"></div>
      <div class="hint-link" id="hintToggle" onclick="toggleHint()">
        <i class="ti ti-help-circle" style="vertical-align:-2px; margin-right:4px;"></i>Show password hint
      </div>
      <div class="hint-reveal" id="hintReveal">my halloween costume in 2006</div>
    </div>

    <div class="bottom-left">
      <div class="user-chip active" id="chip0" onclick="selectUser(0)">
        <div class="chip-avatar">C4P</div>
        <span>User</span>
      </div>
      <div class="user-chip" id="chip1" onclick="selectUser(1)">
        <div class="chip-avatar">C4P</div>
        <span>Administrator</span>
      </div>
    </div>

    <div class="bottom-right">
      <div class="brand">Computers4Peo<span>ple</span></div>
      <div class="sys-icons">
        <span class="sys-icon" title="Accessibility"><i class="ti ti-accessible"></i></span>
        <span class="sys-icon" title="Network"><i class="ti ti-wifi"></i></span>
        <span class="sys-icon" title="Power" onclick="shutdown()"><i class="ti ti-power"></i></span>
      </div>
    </div>

    <!-- Desktop / Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="win10-desktop" id="win10Desktop" oncontextmenu="showCtxMenu(event)">

        <!-- Wallpaper Windows logo watermark -->
        <div class="desktop-winlogo">
          <svg width="460" height="445" viewBox="0 0 300 290" xmlns="http://www.w3.org/2000/svg">
            <polygon points="0,34  138,0  138,133  0,133" fill="white"/>
            <polygon points="148,0  300,22  300,133  148,133" fill="white"/>
            <polygon points="0,143  138,143  138,278  0,256" fill="white"/>
            <polygon points="148,143  300,143  300,268  148,278" fill="white"/>
          </svg>
        </div>

        <!-- Desktop icons -->
        <div class="desktop-icons">
          <div class="desk-icon" ondblclick="alert('Recycle Bin is empty.')">
            <div class="desk-icon-img">🗑️</div>
            <div class="desk-icon-label">Recycle Bin</div>
          </div>
          <div class="desk-icon" ondblclick="alert('Opening Microsoft Edge...')">
            <div class="desk-icon-img">🌐</div>
            <div class="desk-icon-label">Microsoft Edge</div>
          </div>
          <div class="desk-icon" ondblclick="lockAgain()">
            <div class="desk-icon-img">🔒</div>
            <div class="desk-icon-label">Lock Screen</div>
          </div>
        </div>

        <!-- Lock button top-right -->
        <button class="lock-btn" onclick="lockAgain()">
          <i class="ti ti-lock"></i> Lock
        </button>

        <!-- Right-click context menu -->
        <div class="ctx-menu" id="ctxMenu">
          <div class="ctx-item">View</div>
          <div class="ctx-item">Sort by</div>
          <div class="ctx-item">Refresh</div>
          <div class="ctx-sep"></div>
          <div class="ctx-item">New</div>
          <div class="ctx-sep"></div>
          <div class="ctx-item" onclick="lockAgain()">Lock screen</div>
          <div class="ctx-item">Display settings</div>
          <div class="ctx-item">Personalize</div>
        </div>

        <!-- Taskbar -->
        <div class="taskbar">
          <div class="tb-start" title="Start">
            <svg viewBox="0 0 18 18" fill="white" xmlns="http://www.w3.org/2000/svg">
              <polygon points="1,1 8,1 8,8 1,8"/>
              <polygon points="10,1 17,1 17,8 10,8"/>
              <polygon points="1,10 8,10 8,17 1,17"/>
              <polygon points="10,10 17,10 17,17 10,17"/>
            </svg>
          </div>
          <div class="tb-search">
            <i class="ti ti-search"></i>
            <span>Type here to search</span>
          </div>
          <div class="tb-taskview">
            <i class="ti ti-layout-grid"></i>
          </div>
          <div class="tb-apps">
            <div class="tb-app" title="File Explorer">📁<div class="tb-app-dot"></div></div>
            <div class="tb-app" title="Microsoft Edge">🌐</div>
            <div class="tb-app" title="Mail">✉️</div>
            <div class="tb-app" title="Microsoft Store">🛍️</div>
          </div>
          <div class="tb-tray">
            <div class="tb-tray-icons">
              <i class="ti ti-chevron-up"></i>
              <i class="ti ti-wifi"></i>
              <i class="ti ti-volume"></i>
            </div>
            <div class="tb-clock">
              <div class="tb-clock-time" id="taskTime"></div>
              <div class="tb-clock-date" id="taskDate"></div>
            </div>
            <div class="tb-notif"><i class="ti ti-message"></i></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'User' },
      { name: 'Administrator' }
    ];
    let currentUser = 0;
    let eyeOn = false;

    const passInput = document.getElementById('passInput');
    const errorMsg  = document.getElementById('errorMsg');
    const displayName = document.getElementById('displayName');
    const successOverlay = document.getElementById('successOverlay');
    const welcomeUser = document.getElementById('welcomeUser');
    const eyeBtn = document.getElementById('eyeBtn');

    function toggleHint() {
      const reveal = document.getElementById('hintReveal');
      const toggle = document.getElementById('hintToggle');
      const visible = reveal.classList.toggle('visible');
      toggle.innerHTML = (visible
        ? '<i class="ti ti-eye-off" style="vertical-align:-2px; margin-right:4px;"></i>Hide password hint'
        : '<i class="ti ti-help-circle" style="vertical-align:-2px; margin-right:4px;"></i>Show password hint');
    }

    function selectUser(idx) {
      currentUser = idx;
      displayName.textContent = users[idx].name;
      passInput.value = '';
      errorMsg.textContent = '';
      passInput.focus();
      [0, 1].forEach(i => {
        document.getElementById('chip' + i).classList.toggle('active', i === idx);
      });
    }

    eyeBtn.addEventListener('click', () => {
      eyeOn = !eyeOn;
      passInput.type = eyeOn ? 'text' : 'password';
      eyeBtn.querySelector('i').className = eyeOn ? 'ti ti-eye-off' : 'ti ti-eye';
    });

    function tryLogin() {
      const val = passInput.value;
      if (!val.trim()) {
        triggerShake();
        errorMsg.textContent = 'The password field is empty.';
        return;
      }
      if (val !== 'incorrect') {
        triggerShake();
        passInput.value = '';
        errorMsg.textContent = 'The password is incorrect. Please try again.';
        return;
      }
      errorMsg.textContent = '';
      successOverlay.classList.add('show');
      welcomeUser.textContent = users[currentUser].name;
      updateTime();
    }

    function triggerShake() {
      passInput.classList.remove('shake');
      void passInput.offsetWidth; // reflow
      passInput.classList.add('shake');
      passInput.addEventListener('animationend', () => passInput.classList.remove('shake'), { once: true });
    }

    function lockAgain() {
      successOverlay.classList.remove('show');
      passInput.value = '';
      errorMsg.textContent = '';
      setTimeout(() => passInput.focus(), 300);
    }

    function shutdown() {
      const screen = document.getElementById('winScreen');
      screen.style.transition = 'opacity 1.2s ease';
      screen.style.opacity = '0';
      setTimeout(() => {
        screen.style.opacity = '1';
        screen.style.transition = 'opacity 0.6s ease';
      }, 1800);
    }

    function updateTime() {
      const now = new Date();
      const timeEl = document.getElementById('taskTime');
      const dateEl = document.getElementById('taskDate');
      if (timeEl) timeEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (dateEl) dateEl.textContent = now.toLocaleDateString([], { month: 'numeric', day: 'numeric', year: 'numeric' });
    }

    function showCtxMenu(e) {
      e.preventDefault();
      const menu = document.getElementById('ctxMenu');
      const desktop = document.getElementById('win10Desktop');
      const rect = desktop.getBoundingClientRect();
      let x = e.clientX - rect.left;
      let y = e.clientY - rect.top;
      if (x + 200 > rect.width) x = rect.width - 204;
      if (y + 280 > rect.height - 48) y = rect.height - 330;
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
      menu.classList.add('open');
    }

    document.addEventListener('click', () => {
      const menu = document.getElementById('ctxMenu');
      if (menu) menu.classList.remove('open');
    });

    document.getElementById('submitBtn').addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    updateTime();
    setInterval(updateTime, 30000);
    window.addEventListener('load', () => passInput.focus());
  </script>
</body>
</html>
